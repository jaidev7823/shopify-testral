services:
  app:
    image: your-dockerhub-username/shopify-app:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopify_app
    volumes:
      - pgdata:/var/lib/postgresql/data
