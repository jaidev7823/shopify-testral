name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci
      - run: npm run build

      - name: Deploy to server
        run: |
          ssh user@server "
            cd /var/www/shopify-app &&
            git pull &&
            npm ci &&
            npm run build &&
            pm2 restart shopify-app
          "
